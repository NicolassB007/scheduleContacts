spring.application.name=contactSchedule

# H2: o Spring configura o resto automaticamente
spring.datasource.url=jdbc:h2:mem:agendadb
spring.datasource.driver-class-name=org.h2.Driver

# Mostra o SQL gerado pelo Hibernate no console: ótimo para aprender
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Recria as tabelas toda vez que a aplicaçăo sobe
spring.jpa.hibernate.ddl-auto=create-drop

# Interface web do H2: acesse em http://localhost:8080/h2-console
spring.h2.console.enabled=true